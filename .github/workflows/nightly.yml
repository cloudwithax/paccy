name: Nightly Build

on:
  push:
    branches: ["*"]
    tags-ignore: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm base-devel cmake qt6-base polkit git qt6-tools
          useradd -m builder

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and package
        run: |
          cp -r . /home/builder/build
          chown -R builder:builder /home/builder/build
          su builder -c '
            cd /home/builder/build
            VERSION=$(grep ^pkgver PKGBUILD | cut -d= -f2)
            tar czf "../paccy-${VERSION}.tar.gz" \
              --transform "s,^\.,paccy-${VERSION}," \
              --exclude=".git" --exclude="build" --exclude=".github" --exclude="*.tar.gz" .
            mv "../paccy-${VERSION}.tar.gz" .
            sed -i "s|^source=.*|source=(\"paccy-${VERSION}.tar.gz\")|" PKGBUILD
            sed -i "s|^sha256sums=.*|sha256sums=(SKIP)|" PKGBUILD
            makepkg --noconfirm
          '
          cp /home/builder/build/*.pkg.tar.zst .

      - name: Rename nightly artifact
        run: |
          PKG=$(ls *.pkg.tar.zst 2>/dev/null | head -1)
          NIGHTLY="paccy-nightly-$(date +%Y%m%d)-${GITHUB_SHA:0:7}-x86_64.pkg.tar.zst"
          mv "$PKG" "$NIGHTLY"
          echo "PKG_FILE=$NIGHTLY" >> $GITHUB_ENV

      - name: Delete old nightly
        continue-on-error: true
        run: |
          gh release delete nightly --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nightly release
        run: |
          gh release create nightly \
            --title "Nightly Build" \
            --notes "Automated build from ${{ github.sha }}" \
            --prerelease \
            "$PKG_FILE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
